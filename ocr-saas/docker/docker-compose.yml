version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: ocr-saas-postgres
    environment:
      POSTGRES_DB: ocr_saas
      POSTGRES_USER: ocr_saas
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ocr_saas_secret}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ocr_saas"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: ocr-saas-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # RabbitMQ Message Queue
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: ocr-saas-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-ocr_saas}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-ocr_saas_secret}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5

  # MinIO Object Storage
  minio:
    image: minio/minio:latest
    container_name: ocr-saas-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-ocr_saas}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-ocr_saas_secret}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Create MinIO buckets on startup
  minio-init:
    image: minio/mc:latest
    container_name: ocr-saas-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_USER:-ocr_saas} $${MINIO_PASSWORD:-ocr_saas_secret};
      mc mb local/ocr-documents --ignore-existing;
      mc mb local/ocr-results --ignore-existing;
      mc mb local/ocr-thumbnails --ignore-existing;
      mc anonymous set public local/ocr-thumbnails;
      exit 0;
      "

  # FastAPI Backend
  api:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: ocr-saas-api
    environment:
      - DATABASE_URL=postgresql+asyncpg://ocr_saas:${POSTGRES_PASSWORD:-ocr_saas_secret}@postgres:5432/ocr_saas
      - REDIS_URL=redis://redis:6379/0
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-ocr_saas}:${RABBITMQ_PASSWORD:-ocr_saas_secret}@rabbitmq:5672
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_USER:-ocr_saas}
      - MINIO_SECRET_KEY=${MINIO_PASSWORD:-ocr_saas_secret}
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - VLLM_BASE_URL=http://vllm:8000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Celery Worker (Preprocessing)
  worker-preprocess:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: ocr-saas-worker-preprocess
    environment:
      - DATABASE_URL=postgresql+asyncpg://ocr_saas:${POSTGRES_PASSWORD:-ocr_saas_secret}@postgres:5432/ocr_saas
      - REDIS_URL=redis://redis:6379/0
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-ocr_saas}:${RABBITMQ_PASSWORD:-ocr_saas_secret}@rabbitmq:5672
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_USER:-ocr_saas}
      - MINIO_SECRET_KEY=${MINIO_PASSWORD:-ocr_saas_secret}
      - WORKER_TYPE=preprocessing
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: celery -A workers.celery_app worker --loglevel=info -Q preprocess_queue -c 2

  # Celery Worker (OCR)
  worker-ocr:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: ocr-saas-worker-ocr
    environment:
      - DATABASE_URL=postgresql+asyncpg://ocr_saas:${POSTGRES_PASSWORD:-ocr_saas_secret}@postgres:5432/ocr_saas
      - REDIS_URL=redis://redis:6379/0
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-ocr_saas}:${RABBITMQ_PASSWORD:-ocr_saas_secret}@rabbitmq:5672
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_USER:-ocr_saas}
      - MINIO_SECRET_KEY=${MINIO_PASSWORD:-ocr_saas_secret}
      - WORKER_TYPE=ocr
      - VLLM_BASE_URL=http://vllm:8000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      vllm:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - model_cache:/root/.cache
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command: celery -A workers.celery_app worker --loglevel=info -Q ocr_queue -c 1

  # vLLM Model Server — GLM-OCR vision model (port 8001)
  vllm:
    image: ghcr.io/vllm/vllm-openai:latest
    container_name: ocr-saas-vllm
    ports:
      - "8001:8000"
    environment:
      - HF_HUB_ENABLE_HF_TRANSFER=1
    volumes:
      - model_cache:/root/.cache
      - ./models:/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command: --model /models/glm-ocr --tensor-parallel-size 1 --host 0.0.0.0 --port 8000
    profiles:
      - gpu

  # vLLM Structuring LLM — text-only model for JSON extraction (port 8002)
  vllm-structuring:
    image: ghcr.io/vllm/vllm-openai:latest
    container_name: ocr-saas-vllm-structuring
    ports:
      - "8002:8001"
    environment:
      - HF_HUB_ENABLE_HF_TRANSFER=1
    volumes:
      - model_cache:/root/.cache
      - ./models:/models
    command: --model /models/structuring-llm --host 0.0.0.0 --port 8001
    profiles:
      - gpu

  # Celery Worker (Structuring) — uses dedicated structuring LLM server
  worker-structuring:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: ocr-saas-worker-structuring
    environment:
      - DATABASE_URL=postgresql+asyncpg://ocr_saas:${POSTGRES_PASSWORD:-ocr_saas_secret}@postgres:5432/ocr_saas
      - REDIS_URL=redis://redis:6379/0
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-ocr_saas}:${RABBITMQ_PASSWORD:-ocr_saas_secret}@rabbitmq:5672
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_USER:-ocr_saas}
      - MINIO_SECRET_KEY=${MINIO_PASSWORD:-ocr_saas_secret}
      - WORKER_TYPE=structuring
      - STRUCTURING_LLM_BASE_URL=http://vllm-structuring:8001
      - STRUCTURING_LLM_MODEL_NAME=structuring-llm
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: celery -A workers.celery_app worker --loglevel=info -Q structuring_queue -c 2

  # Prometheus Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: ocr-saas-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  # Grafana Dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: ocr-saas-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  minio_data:
  model_cache:
  prometheus_data:
  grafana_data:
