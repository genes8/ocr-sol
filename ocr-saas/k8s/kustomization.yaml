apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ocr-saas

resources:
  - namespace.yaml
  - configmap.yaml
  - secrets.yaml
  - postgres.yaml
  - redis-rabbitmq.yaml
  - minio.yaml
  - api-deployment.yaml
  - workers.yaml
  - gpu-deployments.yaml
  - frontend-deployment.yaml
  - hpa.yaml
  - monitoring.yaml
  - network-policy.yaml
  - keda-scaledobjects.yaml

commonLabels:
  app.kubernetes.io/name: ocr-saas
  app.kubernetes.io/managed-by: kustomize

configMapGenerator:
  - name: ocr-saas-labels
    literals:
      - app=ocr-saas

secretGenerator:
  - name: ocr-saas-generated-secrets
    type: Opaque
    envs:
      - .env.production
