apiVersion: v1
kind: Service
metadata:
  name: worker-preprocess
  namespace: ocr-saas
  labels:
    app: worker-preprocess
    component: worker
spec:
  clusterIP: None
  selector:
    app: worker-preprocess
    component: worker
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-preprocess
  namespace: ocr-saas
  labels:
    app: worker-preprocess
    component: worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: worker-preprocess
      component: worker
  template:
    metadata:
      labels:
        app: worker-preprocess
        component: worker
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
    spec:
      serviceAccountName: worker
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: worker
          image: ocr-saas-backend:latest
          imagePullPolicy: IfNotPresent
          command: ["celery", "-A", "workers.celery_app", "worker"]
          args:
            - "--loglevel=info"
            - "-Q=preprocess_queue"
            - "-c=2"
            - "--hostname=preprocess@%h"
          ports:
            - containerPort: 9090
              name: metrics
          env:
            - name: WORKER_TYPE
              value: "preprocessing"
            - name: DATABASE_URL
              value: "postgresql+asyncpg://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres.ocr-saas.svc.cluster.local:5432/$(POSTGRES_DB)"
            - name: REDIS_URL
              value: "redis://redis.ocr-saas.svc.cluster.local:6379/0"
            - name: RABBITMQ_URL
              value: "amqp://$(RABBITMQ_USER):$(RABBITMQ_PASSWORD)@rabbitmq.ocr-saas.svc.cluster.local:5672/"
            - name: MINIO_ENDPOINT
              value: "minio.ocr-saas.svc.cluster.local:9000"
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: ocr-saas-secrets
                  key: MINIO_USER
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: ocr-saas-secrets
                  key: MINIO_PASSWORD
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: ocr-saas-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ocr-saas-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: ocr-saas-secrets
                  key: POSTGRES_DB
            - name: RABBITMQ_USER
              valueFrom:
                secretKeyRef:
                  name: ocr-saas-secrets
                  key: RABBITMQ_USER
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ocr-saas-secrets
                  key: RABBITMQ_PASSWORD
            - name: PDF_DPI
              valueFrom:
                configMapKeyRef:
                  name: ocr-saas-config
                  key: PDF_DPI
            - name: THUMBNAIL_WIDTH
              valueFrom:
                configMapKeyRef:
                  name: ocr-saas-config
                  key: THUMBNAIL_WIDTH
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: var-run
              mountPath: /var/run
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: tmp
          emptyDir: {}
        - name: var-run
          emptyDir: {}
---
