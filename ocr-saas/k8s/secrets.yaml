# IMPORTANT: Do NOT commit real secrets to this file.
#
# This file uses ExternalSecrets Operator to pull secrets from HashiCorp Vault
# (or AWS Secrets Manager / GCP Secret Manager — swap the secretStoreRef).
#
# Prerequisites:
#   1. Install External Secrets Operator:
#      helm repo add external-secrets https://charts.external-secrets.io
#      helm install external-secrets external-secrets/external-secrets -n external-secrets --create-namespace
#   2. Create a ClusterSecretStore pointing at your Vault:
#      kubectl apply -f k8s/secret-store.yaml
#   3. Populate Vault paths before deploying:
#      vault kv put secret/ocr-saas/postgres password=<openssl rand -base64 32>
#      vault kv put secret/ocr-saas/rabbitmq password=<openssl rand -base64 32>
#      vault kv put secret/ocr-saas/minio    password=<openssl rand -base64 32>
#      vault kv put secret/ocr-saas/app      secret_key=<openssl rand -base64 48> encryption_key=<openssl rand -base64 32>
#
# If you prefer kubectl create secret (CI/CD without Vault):
#   kubectl create secret generic ocr-saas-secrets -n ocr-saas \
#     --from-literal=POSTGRES_USER=ocr_saas \
#     --from-literal=POSTGRES_PASSWORD=$(openssl rand -base64 32) \
#     --from-literal=POSTGRES_DB=ocr_saas \
#     --from-literal=RABBITMQ_USER=ocr_saas \
#     --from-literal=RABBITMQ_PASSWORD=$(openssl rand -base64 32) \
#     --from-literal=MINIO_USER=ocr_saas \
#     --from-literal=MINIO_PASSWORD=$(openssl rand -base64 32) \
#     --from-literal=SECRET_KEY=$(openssl rand -base64 48) \
#     --from-literal=ENCRYPTION_KEY=$(openssl rand -base64 32)
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ocr-saas-secrets
  namespace: ocr-saas
  labels:
    app: ocr-saas
    component: secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: ocr-saas-secrets
    creationPolicy: Owner
  data:
    - secretKey: POSTGRES_USER
      remoteRef:
        key: secret/ocr-saas/postgres
        property: user
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: secret/ocr-saas/postgres
        property: password
    - secretKey: POSTGRES_DB
      remoteRef:
        key: secret/ocr-saas/postgres
        property: db
    - secretKey: RABBITMQ_USER
      remoteRef:
        key: secret/ocr-saas/rabbitmq
        property: user
    - secretKey: RABBITMQ_PASSWORD
      remoteRef:
        key: secret/ocr-saas/rabbitmq
        property: password
    - secretKey: MINIO_USER
      remoteRef:
        key: secret/ocr-saas/minio
        property: user
    - secretKey: MINIO_PASSWORD
      remoteRef:
        key: secret/ocr-saas/minio
        property: password
    - secretKey: SECRET_KEY
      remoteRef:
        key: secret/ocr-saas/app
        property: secret_key
    - secretKey: ENCRYPTION_KEY
      remoteRef:
        key: secret/ocr-saas/app
        property: encryption_key
---
# TLS secret — do NOT store cert/key here.
# Create it imperatively:
#   kubectl create secret tls ocr-saas-tls --cert=cert.pem --key=key.pem -n ocr-saas
# Or use cert-manager with an Issuer/Certificate resource.
