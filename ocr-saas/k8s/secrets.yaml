apiVersion: v1
kind: Secret
metadata:
  name: ocr-saas-secrets
  namespace: ocr-saas
  labels:
    app: ocr-saas
    component: secrets
type: Opaque
stringData:
  # Database credentials
  POSTGRES_USER: "ocr_saas"
  POSTGRES_PASSWORD: "CHANGE_ME_IN_PRODUCTION"
  POSTGRES_DB: "ocr_saas"
  
  # RabbitMQ credentials
  RABBITMQ_USER: "ocr_saas"
  RABBITMQ_PASSWORD: "CHANGE_ME_IN_PRODUCTION"
  
  # MinIO credentials
  MINIO_USER: "ocr_saas"
  MINIO_PASSWORD: "CHANGE_ME_IN_PRODUCTION"
  
  # JWT Secret
  SECRET_KEY: "CHANGE_ME_USE_STRONG_RANDOM_KEY_IN_PRODUCTION"
  
  # Encryption key for document storage
  ENCRYPTION_KEY: "CHANGE_ME_32_BYTES_BASE64_ENCODED"
---
apiVersion: v1
kind: Secret
metadata:
  name: ocr-saas-tls
  namespace: ocr-saas
  labels:
    app: ocr-saas
    component: tls
type: kubernetes.io/tls
stringData:
  # Generate with: openssl req -x509 -newkey rsa:4096 -keyout key.pem -out cert.pem -days 365 -nodes
  # Then base64 encode: cat cert.pem | base64 -w0
  tls.crt: "BASE64_ENCODED_CERTIFICATE"
  tls.key: "BASE64_ENCODED_PRIVATE_KEY"
