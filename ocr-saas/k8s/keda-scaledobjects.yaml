# KEDA ScaledObjects — scale workers by RabbitMQ queue depth
#
# Prerequisites:
#   helm repo add kedacore https://kedacore.github.io/charts
#   helm install keda kedacore/keda -n keda --create-namespace
#
# RabbitMQ management plugin must be enabled (default in rabbitmq:3-management image).
# KEDA uses the HTTP API trigger to query queue depth.
# managementURI uses FQDN so KEDA (in its own namespace) can reach RabbitMQ.
---
# TriggerAuthentication — shared credentials for all ScaledObjects
apiVersion: keda.sh/v1alpha1
kind: TriggerAuthentication
metadata:
  name: rabbitmq-trigger-auth
  namespace: ocr-saas
spec:
  secretTargetRef:
    - parameter: username
      name: ocr-saas-secrets
      key: RABBITMQ_USER
    - parameter: password
      name: ocr-saas-secrets
      key: RABBITMQ_PASSWORD
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: worker-preprocess-scaledobject
  namespace: ocr-saas
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: worker-preprocess
  minReplicaCount: 1
  maxReplicaCount: 8
  cooldownPeriod: 60
  pollingInterval: 15
  triggers:
    - type: rabbitmq
      authenticationRef:
        name: rabbitmq-trigger-auth
      metadata:
        protocol: http
        managementURI: http://rabbitmq.ocr-saas.svc.cluster.local:15672
        queueName: preprocess_queue
        mode: QueueLength
        value: "5"
---
